name: Build
run-name: Perform build for push by ${{ github.actor }}
on: [push]

jobs:
  run-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main

      - name: Build cache setup
        id: build-cache
        uses: actions/cache@v4
        with:
          path: engine/libraries
          key: ${{ runner.os }}-${{ hashFiles('script/libraries.sh') }}-${{ hashFiles('engine/CMakeLists.txt') }}-${{ hashFiles('game2d/CMakeLists.txt') }}

      - name: Generate build cache
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: ./script/libraries.sh

      - name: Perform build
        run: ./script/build -o bin-game2d -b Release gen-build game2d
